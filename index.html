/* ================== styles.css ================== */
/* ===========================================================
   LION TECH — CANECAS PERSONALIZADAS
   styles.css — tokens, fundo, animações e utilitários globais
   =========================================================== */

/* ---------- TOKENS / DESIGN SYSTEM ---------- */
:root {
  /* Paleta */
  --bg-0: #fff7f5;
  --bg-1: #fdeef0;
  --bg-2: #fbe1e7;
  --surface: rgba(255,255,255,.78);
  --surface-strong: rgba(255,255,255,.94);
  --line: rgba(124, 58, 237, .14);
  --line-soft: rgba(124, 58, 237, .08);

  --text: #1f1230;
  --text-soft: #4b3a63;
  --text-mute: #7d6a92;

  /* Acentos */
  --accent: #e11d48;          /* vermelho rosado principal */
  --accent-2: #7c3aed;        /* roxo Lion Tech */
  --accent-3: #ec4899;        /* rosa */
  --wine: #881337;
  --gold: #c9a44a;

  --grad-hot: linear-gradient(135deg,#e11d48 0%, #ec4899 50%, #7c3aed 100%);
  --grad-soft: linear-gradient(135deg,#fbe1e7 0%, #f5e6ff 100%);
  --grad-text: linear-gradient(120deg,#e11d48,#7c3aed);

  /* Tipografia */
  --font-title: "Fraunces","Playfair Display", "Cormorant Garamond", Georgia, serif;
  --font-body: "Inter","Plus Jakarta Sans","Segoe UI",system-ui,sans-serif;
  --font-mono: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;

  /* Métricas */
  --radius-xs: 8px;
  --radius-s: 14px;
  --radius-m: 22px;
  --radius-l: 32px;
  --radius-pill: 999px;

  --shadow-1: 0 2px 6px rgba(124,58,237,.06), 0 12px 28px rgba(225,29,72,.06);
  --shadow-2: 0 6px 18px rgba(124,58,237,.10), 0 22px 60px rgba(225,29,72,.10);
  --shadow-3: 0 16px 50px rgba(124,58,237,.18), 0 40px 90px rgba(225,29,72,.16);

  --container: min(1200px, 92vw);

  /* Densidade (alterada pelo painel Tweaks) */
  --pad-section: 110px;
  --gap-card: 22px;

  /* Glow */
  --glow-strength: .55;
}

/* ---------- DENSIDADES ---------- */
:root[data-density="suave"]   { --pad-section: 80px;  --gap-card: 18px; }
:root[data-density="normal"]  { --pad-section: 110px; --gap-card: 22px; }
:root[data-density="intensa"] { --pad-section: 150px; --gap-card: 28px; }

/* ---------- GLOW ON/OFF ---------- */
:root[data-glow="off"] { --glow-strength: 0; }

/* ---------- RESET ---------- */
*,*::before,*::after { box-sizing: border-box; }
html, body { margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  background:
    radial-gradient(1200px 700px at 8% -10%, #ffe4ec 0%, transparent 60%),
    radial-gradient(1100px 700px at 110% 10%, #efe1ff 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 60%, var(--bg-2) 100%);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img, svg, video { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 3px; border-radius: 6px; }

/* ---------- TIPOGRAFIA UTIL ---------- */
h1,h2,h3,h4 {
  font-family: var(--font-title);
  font-weight: 600;
  letter-spacing: -.01em;
  margin: 0;
  color: var(--text);
  text-wrap: balance;
}
h1 { font-size: clamp(38px, 6vw, 76px); line-height: 1.02; }
h2 { font-size: clamp(28px, 3.6vw, 48px); line-height: 1.1; }
h3 { font-size: clamp(20px, 2vw, 26px); }
p  { text-wrap: pretty; color: var(--text-soft); }

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent-2);
  background: rgba(124,58,237,.08);
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--line);
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--grad-hot);
  box-shadow: 0 0 0 4px rgba(225,29,72,.12);
}
.gradient-text {
  background: var(--grad-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.struck {
  position: relative;
  color: var(--text-mute);
  text-decoration: line-through;
  text-decoration-color: rgba(225,29,72,.55);
  text-decoration-thickness: 3px;
}

/* ---------- LAYOUT ---------- */
.container {
  width: var(--container);
  margin: 0 auto;
}
.section {
  padding: var(--pad-section) 0;
  position: relative;
}
.grid {
  display: grid;
  gap: var(--gap-card);
}

/* ---------- BOTÕES ---------- */
.btn {
  --bg: var(--text);
  --fg: #fff;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: var(--radius-pill);
  border: 0;
  background: var(--bg);
  color: var(--fg);
  font-weight: 600;
  font-size: 14.5px;
  letter-spacing: .01em;
  transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
  text-decoration: none;
  white-space: nowrap;
}
.btn svg { width: 18px; height: 18px; }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); filter: brightness(.95); }

.btn-primary {
  --bg: var(--grad-hot);
  background: var(--grad-hot);
  color: #fff;
  box-shadow:
    0 10px 28px rgba(225,29,72, calc(.30 * var(--glow-strength))),
    0 4px 12px rgba(124,58,237, calc(.25 * var(--glow-strength))),
    inset 0 1px 0 rgba(255,255,255,.25);
}
.btn-primary::after {
  content:"";
  position:absolute;
  inset:-3px;
  border-radius: inherit;
  background: var(--grad-hot);
  filter: blur(20px);
  opacity: calc(.55 * var(--glow-strength));
  z-index:-1;
  transition: opacity .3s ease;
}
.btn-primary:hover::after { opacity: calc(.85 * var(--glow-strength)); }

.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.btn-ghost:hover {
  border-color: var(--accent-2);
  color: var(--accent-2);
  background: rgba(124,58,237,.05);
}

.btn-wpp {
  background: linear-gradient(135deg,#25d366 0%,#128c7e 100%);
  color:#fff;
  box-shadow: 0 10px 28px rgba(37,211,102, calc(.30 * var(--glow-strength)));
}

/* ---------- CARD GENÉRICO ---------- */
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 28px;
  box-shadow: var(--shadow-1);
  transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .35s ease;
  overflow: hidden;
  backdrop-filter: blur(8px);
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-2);
  border-color: rgba(124,58,237,.28);
}
.card .stat {
  margin-top: 18px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.card .stat::before {
  content:"";
  width: 26px; height: 1px;
  background: var(--grad-hot);
  display: inline-block;
}

/* ---------- FUNDO DE CORAÇÕES ANIMADOS ---------- */
.heart-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.heart-bg .heart {
  position: absolute;
  bottom: -40px;
  width: 22px; height: 22px;
  opacity: 0;
  animation: floatUp linear infinite;
  filter: drop-shadow(0 4px 8px rgba(225,29,72,.12));
}
@keyframes floatUp {
  0%   { transform: translateY(0) translateX(0) rotate(0deg) scale(.6); opacity: 0; }
  10%  { opacity: .85; }
  50%  { transform: translateY(-55vh) translateX(var(--drift, 30px)) rotate(15deg) scale(.9); }
  90%  { opacity: .7; }
  100% { transform: translateY(-110vh) translateX(calc(var(--drift, 30px) * -1)) rotate(-10deg) scale(.5); opacity: 0; }
}
:root[data-hearts="off"] .heart-bg { display: none; }

/* ---------- REVEAL / INTERSECTION ---------- */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);
  will-change: transform, opacity;
}
.reveal.in-view, :root[data-anim="off"] .reveal {
  opacity: 1;
  transform: none;
}
:root[data-anim="off"] .reveal { transition: none; }

/* ---------- TILT 3D ---------- */
.tilt {
  transform-style: preserve-3d;
  transition: transform .25s ease, box-shadow .25s ease;
  will-change: transform;
}
.tilt-inner { transform: translateZ(40px); transform-style: preserve-3d; }

/* ---------- CANECA SVG VISUAL ---------- */
.mug-visual {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  border-radius: var(--radius-l);
  background:
    radial-gradient(800px 500px at 20% 10%, rgba(255,210,224,.6), transparent 60%),
    radial-gradient(700px 500px at 90% 90%, rgba(216,193,255,.55), transparent 60%),
    linear-gradient(135deg,#fff 0%, #fff5f7 60%, #f4ecff 100%);
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-2);
  overflow: hidden;
  isolation: isolate;
}
.mug-visual::before {
  content:"";
  position: absolute;
  inset:0;
  background: radial-gradient(circle at 30% 30%, rgba(225,29,72,.10), transparent 50%);
  z-index:1;
  pointer-events:none;
}

/* ---------- LAYOUT 2 COLUNAS UTIL ---------- */
.cols-2 {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 56px;
  align-items: center;
}
@media (max-width: 760px) {
  .cols-2 { grid-template-columns: minmax(0,1fr); gap: 32px; }
  :root { --pad-section: 70px; }
}

/* ---------- ÍCONES ---------- */
.icon-circle {
  width: 44px; height: 44px;
  border-radius: 14px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, rgba(225,29,72,.10), rgba(124,58,237,.10));
  color: var(--accent-2);
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.icon-circle svg { width: 22px; height: 22px; }

/* ---------- HELPERS ---------- */
.muted { color: var(--text-mute); }
.center { text-align: center; }
.row { display:flex; align-items:center; gap: 12px; flex-wrap: wrap; }
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
  margin: 0;
  border: 0;
}

/* ---------- SCROLLBAR ESTILIZADA ---------- */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(225,29,72,.3), rgba(124,58,237,.3));
  border-radius: 10px;
}

/* ================== sections.css ================== */
/* ===========================================================
   sections.css — estilos por seção
   =========================================================== */

/* ============== NAV ============== */
.lt-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(14px);
  background: rgba(255, 247, 245, .72);
  border-bottom: 1px solid var(--line-soft);
}
.lt-nav__inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  padding: 14px 0;
}
.lt-nav__brand {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -.01em;
  color: var(--text);
}
.lt-nav__brand .logo-mark {
  width: 46px; height: 46px;
  border-radius: 12px;
  background: #fff;
  border: 1px solid var(--line);
  display: grid; place-items: center;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.lt-nav__brand .logo-mark img,
.lt-nav__brand .logo-mark svg { width: 42px; height: 42px; object-fit: contain; }
.lt-nav__brand small {
  display:block;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-mute);
  letter-spacing: .18em;
  text-transform: uppercase;
  font-family: var(--font-body);
}
.lt-nav__links {
  display: flex; gap: 28px; align-items: center;
}
.lt-nav__links a {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-soft);
  position: relative;
  padding: 6px 2px;
}
.lt-nav__links a:hover { color: var(--accent); }
.lt-nav__links a::after {
  content:""; position:absolute; left:0; right:0; bottom:-2px;
  height: 2px;
  background: var(--grad-hot);
  border-radius: 2px;
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s ease;
}
.lt-nav__links a:hover::after { transform: scaleX(1); }
@media (max-width: 760px) {
  .lt-nav__links { display: none; }
  .lt-nav__brand small { display: none; }
}

/* ============== HERO ============== */
.hero {
  padding: 60px 0 80px;
  position: relative;
  display: flex;
}
.hero__grid {
  display: grid;
  grid-template-columns: minmax(0,1.1fr) minmax(0,.95fr);
  gap: 40px;
  align-items: center;
  width: 100%;
}
/* Título menor para caber na viewport sem scroll */
.hero__title { font-size: clamp(26px, 3.5vw, 52px); line-height: 1.18; }
.hero__lede {
  font-size: clamp(14px,1.1vw,16px);
  margin: 14px 0 22px;
  max-width: 52ch;
  line-height: 1.55;
}
.hero__ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.hero__kpis {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 14px;
  border-top: 1px solid var(--line);
  padding-top: 18px;
}
.kpi { display: flex; flex-direction: column; gap: 2px; }
.kpi__num {
  font-family: var(--font-title);
  font-size: clamp(18px,1.8vw,24px);
  font-weight: 600;
  background: var(--grad-text);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.kpi__label { font-size: 11.5px; color: var(--text-mute); letter-spacing: .03em; }

.hero__visual {
  position: relative;
}
.hero__card {
  position: relative;
  background: transparent;
  padding: 0;
  border: none;
  box-shadow: none;
}
.hero__card .ribbon {
  position:absolute; top: 18px; left: 18px;
  background: var(--grad-hot);
  color:#fff;
  font-size: 11.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  box-shadow: 0 8px 22px rgba(225,29,72,.35);
}
.hero__card .badge {
  position:absolute; top: 18px; right: 18px;
  background: rgba(255,255,255,.82);
  border: 1px solid var(--line);
  font-size: 11.5px; font-weight: 600;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  color: var(--accent-2);
}
.hero__sparkles {
  position:absolute; inset:0; pointer-events:none;
}
.hero__sparkles span {
  position:absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-3);
  box-shadow: 0 0 18px rgba(236,72,153,.7);
  animation: sparkle 4s ease-in-out infinite;
}
@keyframes sparkle {
  0%,100% { transform: scale(.6); opacity:.4; }
  50%     { transform: scale(1.2); opacity:1; }
}
@media (max-width: 760px){
  .hero__grid { grid-template-columns: minmax(0,1fr); }
  .hero__kpis { grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
}

/* ============== MARQUEE ============== */
.marquee {
  overflow: hidden;
  border-block: 1px solid var(--line);
  background: rgba(255,255,255,.45);
  padding: 18px 0;
  position: relative;
}
.marquee__track {
  display: flex;
  gap: 36px;
  width: max-content;
  animation: marquee 38s linear infinite;
}
.marquee__item {
  display: inline-flex; align-items: center; gap: 18px;
  font-family: var(--font-title);
  font-size: clamp(20px, 2.4vw, 30px);
  font-weight: 600;
  letter-spacing: -.01em;
  color: var(--text);
  white-space: nowrap;
}
.marquee__item .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--grad-hot);
}
.marquee__item:nth-child(odd) .label {
  background: var(--grad-text);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ============== THESIS ============== */
.thesis__head { max-width: 720px; margin-bottom: 40px; }
.thesis__chart {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 24px;
  margin: 28px 0 36px;
}
.bar-block {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 22px;
  box-shadow: var(--shadow-1);
}
.bar-block h4 {
  font-family: var(--font-body); font-size: 13px; letter-spacing:.14em;
  text-transform: uppercase; color: var(--text-mute); margin-bottom: 8px;
}
.bar-block .value {
  font-family: var(--font-title);
  font-size: clamp(26px,3vw,38px);
  font-weight: 600;
}
.bar-block .bar {
  margin-top: 14px;
  height: 12px;
  border-radius: 999px;
  background: rgba(124,58,237,.10);
  overflow: hidden;
  position: relative;
}
.bar-block .bar i {
  display: block; height: 100%;
  border-radius: 999px;
  background: var(--grad-hot);
  width: 0%;
  transition: width 1.4s cubic-bezier(.2,.7,.2,1);
}
.bar-block.is-low .bar i { background: linear-gradient(90deg, #c8b8d6, #b0a0bf); }

.thesis__points {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 18px;
}
.thesis__point {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 18px;
}
.thesis__point .num {
  font-family: var(--font-title);
  font-weight: 600;
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--grad-hot); color:#fff;
  display: grid; place-items: center;
  font-size: 14px;
  flex-shrink:0;
}
.thesis__point p { margin: 4px 0 0; font-size: 14.5px; }
@media (max-width: 760px){
  .thesis__chart, .thesis__points { grid-template-columns: minmax(0,1fr); }
}

/* ============== ARGUMENTOS ============== */
.args__grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 22px;
}
.arg-card { padding: 28px; }
.arg-card h3 {
  font-size: 22px; margin-bottom: 6px;
}
.arg-card .lede {
  font-weight: 600; color: var(--text); margin-bottom: 10px;
  font-family: var(--font-body);
}
.arg-card p { font-size: 14.5px; line-height: 1.6; }
.arg-card .top {
  display:flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.arg-card .num {
  font-family: var(--font-mono); font-size: 12.5px;
  color: var(--accent-2); font-weight: 600;
  letter-spacing:.18em;
}
@media (max-width: 980px){ .args__grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px){ .args__grid { grid-template-columns: 1fr; } }

/* ============== PULL BAND ============== */
.pull {
  background: var(--grad-hot);
  color: #fff;
  padding: 50px 0;
  position: relative;
  overflow: hidden;
}
.pull::before {
  content:""; position:absolute; inset:-2px;
  background: radial-gradient(800px 200px at 50% 50%, rgba(255,255,255,.3), transparent 70%);
  pointer-events:none;
}
.pull__inner {
  display:flex; align-items:center; justify-content: space-between;
  gap: 24px; flex-wrap: wrap;
  position:relative; z-index:1;
}
.pull h2 {
  color: #fff;
  font-size: clamp(26px, 3.4vw, 44px);
  max-width: 28ch;
}
.pull svg { width: 84px; height: 84px; opacity: .85; flex-shrink: 0; }

/* ============== WHY NOW ============== */
.whynow__grid {
  display:grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 22px;
}
.why-card {
  position: relative;
  padding: 28px;
}
.why-card .badge {
  display: inline-flex; align-items:center; gap:8px;
  font-size: 12.5px; font-weight:700; letter-spacing:.06em;
  background: rgba(225,29,72,.08);
  color: var(--accent);
  border: 1px solid rgba(225,29,72,.18);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  margin-bottom: 14px;
}
.why-card h3 { font-size: 22px; margin-bottom: 6px; }
.why-card p { font-size: 14.5px; }
@media (max-width: 760px){ .whynow__grid { grid-template-columns: 1fr; } }

/* ============== BEFORE / AFTER ============== */
.ba__panels {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 24px;
}
.ba__panel {
  border-radius: var(--radius-l);
  padding: 28px;
  border: 1px solid var(--line);
  background: var(--surface);
  position: relative;
  overflow: hidden;
}
.ba__panel.is-after {
  background: linear-gradient(160deg, #fff 0%, #fff1f5 60%, #f5e8ff 100%);
}
.ba__panel h3 {
  font-size: 22px;
  margin-bottom: 6px;
  display:flex; align-items:center; gap:10px;
}
.ba__panel ul { list-style: none; padding:0; margin: 8px 0 22px; }
.ba__panel li {
  display:flex; align-items:center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--line-soft);
  font-size: 14.5px;
}
.ba__panel li:last-child { border-bottom: 0; }
.ba__panel.is-before li { color: var(--text-mute); }
.ba__panel li svg { width: 16px; height: 16px; flex-shrink:0; }

.ba__bars { display:grid; gap: 14px; }
.ba__bar { display:grid; gap: 6px; }
.ba__bar .row {
  display:flex; justify-content: space-between; align-items: baseline;
  font-size: 13px; color: var(--text-mute); letter-spacing:.04em;
}
.ba__bar .name { color: var(--text); font-weight: 600; font-size: 14px; }
.ba__bar .track {
  height: 10px; border-radius: 999px;
  background: rgba(124,58,237,.10);
  overflow: hidden;
}
.ba__bar .fill { height:100%; border-radius:999px; width: 0%; transition: width 1.3s cubic-bezier(.2,.7,.2,1); }
.is-before .fill { background: linear-gradient(90deg,#c8b8d6,#a392b9); }
.is-after  .fill { background: var(--grad-hot); box-shadow: 0 0 18px rgba(225,29,72,.35); }
@media (max-width: 760px){ .ba__panels { grid-template-columns: 1fr; } }

/* ============== SERVIÇO ============== */
.service__grid {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1.05fr);
  gap: 56px;
  align-items: start;
}
.service__copy h2 { margin-bottom: 16px; }
.service__copy p  { font-size: 16px; margin: 14px 0; }
.frentes {
  display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px;
}
.frente {
  display:flex; align-items:center; gap: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-s);
  padding: 14px 16px;
  font-size: 14px; font-weight: 600;
  transition: transform .25s ease, border-color .25s ease;
}
.frente:hover { transform: translateY(-2px); border-color: rgba(225,29,72,.3); }
@media (max-width: 760px){
  .service__grid, .frentes { grid-template-columns: 1fr; }
}

/* ============== GALERIA ============== */
.gallery__head { display:flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.gallery__grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 22px;
}
.tile {
  position: relative;
  border-radius: var(--radius-l);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
  aspect-ratio: 4/5;
  cursor: pointer;
  transition: box-shadow .35s ease;
}
.tile:hover { box-shadow: var(--shadow-3); }
.tile__media {
  position: absolute; inset: 0;
  display: grid; place-items: center;
}
.tile__media video, .tile__media svg { width: 100%; height: 100%; object-fit: cover; }
.tile__overlay {
  position: absolute; left:0; right:0; bottom:0;
  padding: 20px;
  background: linear-gradient(180deg, transparent, rgba(20,5,30,.78));
  color: #fff;
  display:flex; flex-direction: column; gap: 8px;
}
.tile__overlay .tag {
  align-self: flex-start;
  font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  background: rgba(255,255,255,.18);
  padding: 4px 10px; border-radius: 999px;
  backdrop-filter: blur(8px);
}
.tile__overlay h4 { color:#fff; font-size: 18px; }
.tile__cta {
  align-self: flex-start;
  margin-top: 6px;
  background: #fff;
  color: var(--text);
  padding: 9px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight:700;
  display:inline-flex; align-items:center; gap:8px;
  transition: transform .25s ease;
}
.tile__cta:hover { transform: translateY(-2px); }
.tile__cta svg { width: 14px; height: 14px; }
@media (max-width: 980px){ .gallery__grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px){ .gallery__grid { grid-template-columns: 1fr; } }

/* ============== PROCESSO ============== */
.timeline {
  position: relative;
  padding-left: 60px;
}
.timeline::before {
  content:""; position:absolute; left: 22px; top: 6px; bottom: 6px;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
  border-radius: 2px;
}
.step {
  position: relative;
  padding: 14px 0 30px;
}
.step:last-child { padding-bottom: 0; }
.step__bullet {
  position: absolute;
  left: -60px; top: 14px;
  width: 46px; height: 46px;
  border-radius: 14px;
  background: linear-gradient(135deg, #fff, #fff5f7);
  border: 1px solid var(--line);
  display: grid; place-items: center;
  font-family: var(--font-title);
  font-weight: 700;
  color: var(--accent-2);
  box-shadow: var(--shadow-1);
}
.step h3 { font-size: 21px; }
.step .deliverable {
  display: inline-flex; align-items:center; gap: 8px;
  margin-top: 8px;
  font-size: 12.5px; font-weight: 600;
  background: rgba(124,58,237,.08);
  color: var(--accent-2);
  border: 1px solid var(--line);
  padding: 5px 11px;
  border-radius: var(--radius-pill);
}
.step p { margin-top: 4px; font-size: 14.5px; }

/* ============== FAQ ============== */
.faq__head { max-width: 700px; margin-bottom: 28px; }
.faq__list {
  display:grid; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 12px;
  box-shadow: var(--shadow-1);
}
.faq-item {
  border-radius: var(--radius-m);
  background: rgba(255,255,255,.55);
  border: 1px solid transparent;
  transition: border-color .2s ease, background .2s ease;
}
.faq-item.open {
  border-color: var(--line);
  background: #fff;
  box-shadow: var(--shadow-1);
}
.faq-item button {
  width: 100%;
  background: transparent;
  border: 0;
  text-align: left;
  display:flex; align-items:center; justify-content: space-between;
  gap: 16px;
  padding: 18px 22px;
  font-size: 16px; font-weight: 600;
  color: var(--text);
}
.faq-item .chev {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(124,58,237,.08);
  display: grid; place-items: center;
  transition: transform .3s ease, background .3s ease;
  flex-shrink: 0;
}
.faq-item .chev svg { width: 14px; height: 14px; color: var(--accent-2); }
.faq-item.open .chev { transform: rotate(180deg); background: var(--grad-hot); }
.faq-item.open .chev svg { color: #fff; }
.faq-item .answer {
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease;
}
.faq-item.open .answer { max-height: 240px; }
.faq-item .answer p {
  padding: 0 22px 22px;
  font-size: 14.5px;
  color: var(--text-soft);
  margin: 0;
}

/* ============== FINAL CTA ============== */
.finalcta {
  position: relative;
  padding: 80px 0;
}
.finalcta__box {
  position: relative;
  border-radius: var(--radius-l);
  padding: clamp(40px, 6vw, 80px);
  text-align: center;
  background:
    radial-gradient(800px 400px at 50% 0%, rgba(255,255,255,.7), transparent 60%),
    var(--grad-hot);
  color: #fff;
  overflow: hidden;
  box-shadow:
    0 40px 90px rgba(225,29,72, calc(.30 * var(--glow-strength))),
    0 16px 50px rgba(124,58,237, calc(.30 * var(--glow-strength)));
}
.finalcta__box::before {
  content:""; position:absolute; inset:-30%;
  background: conic-gradient(from 0deg, rgba(255,255,255,.18), transparent 30%, rgba(255,255,255,.12) 60%, transparent 80%, rgba(255,255,255,.18));
  animation: spin 14s linear infinite;
  pointer-events:none;
  filter: blur(20px);
  opacity: calc(.5 * var(--glow-strength) + .15);
}
@keyframes spin { to { transform: rotate(360deg); } }
.finalcta h2 {
  color: #fff;
  font-size: clamp(28px, 4vw, 56px);
  position: relative;
}
.finalcta p {
  color: rgba(255,255,255,.92);
  font-size: clamp(15px, 1.2vw, 18px);
  margin: 18px auto 28px;
  max-width: 60ch;
  position: relative;
}
.finalcta .row { justify-content: center; position: relative; }
.finalcta .btn-primary { background: #fff; color: var(--text); }
.finalcta .btn-primary::after { background: #fff; }
.finalcta .btn-ghost { color: #fff; border-color: rgba(255,255,255,.4); }
.finalcta .btn-ghost:hover { background: rgba(255,255,255,.12); color:#fff; border-color: #fff; }

/* ============== FOOTER ============== */
.footer {
  padding: 60px 0 40px;
  border-top: 1px solid var(--line);
  background: rgba(255,255,255,.4);
  backdrop-filter: blur(8px);
}
.footer__grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 32px;
  align-items: start;
}
.footer__brand { font-family: var(--font-title); font-weight: 700; font-size: 22px; }
.footer__brand p { font-size: 14px; margin-top: 8px; max-width: 28ch; }
.footer__col h5 {
  font-family: var(--font-body);
  font-size: 12.5px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--text-mute);
  margin: 0 0 14px;
  font-weight: 600;
}
.footer__col a {
  display:block; padding: 6px 0;
  font-size: 14px;
  color: var(--text-soft);
  transition: color .2s ease, transform .2s ease;
}
.footer__col a:hover { color: var(--accent-2); transform: translateX(3px); }
.footer__bottom {
  margin-top: 36px;
  padding-top: 18px;
  border-top: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12.5px; color: var(--text-mute); flex-wrap: wrap; gap: 8px;
}
@media (max-width: 760px){
  .footer__grid { grid-template-columns: 1fr 1fr; }
}

/* ============== TWEAKS PANEL ============== */
.tweaks {
  position: fixed;
  right: 18px; bottom: 18px;
  z-index: 100;
}
.tweaks__btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--grad-hot);
  color: #fff;
  border: 0;
  display: grid; place-items: center;
  box-shadow: var(--shadow-2);
  cursor: pointer;
  transition: transform .25s ease;
}
.tweaks__btn:hover { transform: scale(1.06) rotate(8deg); }
.tweaks__btn svg { width: 22px; height: 22px; }
.tweaks__panel {
  position: absolute;
  right: 0;
  bottom: 64px;
  width: 280px;
  background: var(--surface-strong);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 18px;
  box-shadow: var(--shadow-3);
  backdrop-filter: blur(14px);
  transform-origin: bottom right;
  transform: scale(.85) translateY(10px);
  opacity: 0; pointer-events: none;
  transition: transform .25s cubic-bezier(.2,.7,.2,1), opacity .25s ease;
}
.tweaks.open .tweaks__panel {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: auto;
}
.tweaks h6 {
  font-family: var(--font-body);
  font-size: 11.5px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--text-mute);
  margin: 14px 0 8px;
  font-weight: 600;
}
.tweaks h6:first-of-type { margin-top: 0; }
.tweaks__colors {
  display:flex; gap: 8px; flex-wrap: wrap;
}
.tweaks__colors button {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px var(--line);
  cursor: pointer;
  transition: transform .2s ease;
  position: relative;
}
.tweaks__colors button:hover { transform: scale(1.1); }
.tweaks__colors button.is-active {
  box-shadow: 0 0 0 2px var(--accent-2);
  transform: scale(1.1);
}
.tweaks__toggle {
  display:flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
  font-size: 13.5px;
  color: var(--text-soft);
}
.tweaks__sw {
  width: 36px; height: 20px;
  border-radius: 999px;
  background: rgba(124,58,237,.18);
  border: 0;
  cursor: pointer;
  position: relative;
  transition: background .25s ease;
}
.tweaks__sw::after {
  content:""; position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform .25s ease;
  box-shadow: 0 2px 4px rgba(0,0,0,.15);
}
.tweaks__sw.is-on { background: var(--grad-hot); }
.tweaks__sw.is-on::after { transform: translateX(16px); }
.tweaks__density {
  display: grid; grid-template-columns: repeat(3,1fr);
  border-radius: var(--radius-pill);
  background: rgba(124,58,237,.08);
  padding: 4px;
  gap: 2px;
}
.tweaks__density button {
  border: 0;
  background: transparent;
  font-size: 12.5px; font-weight: 600;
  padding: 6px;
  border-radius: var(--radius-pill);
  color: var(--text-soft);
  cursor: pointer;
  transition: background .2s ease, color .2s ease;
}
.tweaks__density button.is-active {
  background: #fff;
  color: var(--accent-2);
  box-shadow: var(--shadow-1);
}
@media (max-width: 600px){
  .tweaks__panel { width: 240px; }
}

/* ============== DASHBOARD MOCK ============== */
.dash {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 14px;
  margin: 28px 0;
}
.dash__card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 18px;
  box-shadow: var(--shadow-1);
}
.dash__card .label {
  font-size: 11.5px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-mute);
}
.dash__card .num {
  font-family: var(--font-title);
  font-size: clamp(26px, 3vw, 38px);
  font-weight: 600;
  background: var(--grad-text);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-top: 6px;
  display:block;
  line-height: 1;
}
.dash__card .delta {
  display:inline-flex; align-items:center; gap:6px;
  margin-top: 8px;
  font-size: 12px; font-weight: 600;
  color: #16a34a;
}
@media (max-width: 760px){ .dash { grid-template-columns: repeat(2,1fr); } }

/* ============== UTIL ANIMATIONS ============== */
@keyframes pulse-soft {
  0%,100% { box-shadow: 0 0 0 0 rgba(225,29,72,.45); }
  50%     { box-shadow: 0 0 0 10px rgba(225,29,72,0); }
}
.pulse { animation: pulse-soft 2.5s ease-in-out infinite; }

/* ============== DEPOIMENTOS / TESTIMONIALS ============== */
.testimonials__head { max-width: 720px; margin-bottom: 48px; }
.testimonials__grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 22px;
}
.testi-card {
  position: relative;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.testi-card .stars {
  display: flex;
  gap: 4px;
  color: var(--gold);
  font-size: 17px;
}
.testi-card .quote {
  font-family: var(--font-title);
  font-size: 17px;
  font-style: italic;
  font-weight: 500;
  color: var(--text);
  line-height: 1.55;
  flex: 1;
}
.testi-card .quote::before {
  content: '\201C';
  font-size: 38px;
  line-height: 0;
  vertical-align: -14px;
  color: var(--accent-3);
  margin-right: 3px;
  font-style: normal;
}
.testi-card .author {
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid var(--line-soft);
  padding-top: 14px;
}
.testi-card .avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--grad-hot);
  display: grid;
  place-items: center;
  font-family: var(--font-title);
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(225,29,72,.25);
}
.testi-card .author-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.testi-card .author-info span {
  font-size: 12.5px;
  color: var(--text-mute);
}
.testi-card .badge-veri {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: #16a34a;
  margin-top: 2px;
}
.testi-card .badge-veri svg { width: 12px; height: 12px; }
@media (max-width: 980px) { .testimonials__grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px) { .testimonials__grid { grid-template-columns: 1fr; } }

/* ============== URGENCY COUNTDOWN ============== */
.urgency {
  background: linear-gradient(135deg, #1f1230 0%, #2e1352 50%, #1a0830 100%);
  color: #fff;
  padding: 40px 0;
  position: relative;
  overflow: hidden;
}
.urgency::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(800px 300px at 50% 50%, rgba(236,72,153,.15), transparent 70%);
  pointer-events: none;
}
.urgency__inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
  position: relative; z-index: 1;
}
.urgency__text h3 {
  color: #fff;
  font-size: clamp(22px, 3vw, 32px);
  margin-bottom: 4px;
}
.urgency__text p { color: rgba(255,255,255,.7); font-size: 14.5px; }
.urgency__clock {
  display: flex;
  gap: 14px;
  align-items: center;
}
.clock-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.clock-unit .num {
  font-family: var(--font-title);
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 700;
  color: #fff;
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 14px;
  padding: 10px 18px;
  min-width: 72px;
  text-align: center;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  transition: transform .1s ease;
}
.clock-unit .lbl {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
}
.clock-sep {
  font-family: var(--font-title);
  font-size: 38px;
  font-weight: 700;
  color: var(--accent-3);
  line-height: 1;
  margin-bottom: 18px;
}

/* ============== FLOATING WPP BUTTON ============== */
.wpp-float {
  position: fixed;
  bottom: 88px;
  right: 18px;
  z-index: 99;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  color: #fff;
  padding: 13px 18px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 8px 30px rgba(37,211,102,.40), 0 2px 8px rgba(0,0,0,.15);
  text-decoration: none;
  transition: transform .25s ease, box-shadow .25s ease, opacity .4s ease;
  opacity: 0;
  transform: translateY(20px);
}
.wpp-float.visible {
  opacity: 1;
  transform: translateY(0);
}
.wpp-float:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(37,211,102,.50);
}
.wpp-float svg { width: 20px; height: 20px; flex-shrink: 0; }

const thesisStyles = {};

function Thesis() {
  const wrap = React.useRef(null);

  // anima as barras quando a seção entra na tela
  React.useEffect(() => {
    const el = wrap.current;
    if (!el) return;
    const io = new IntersectionObserver((ents) => {
      ents.forEach((e) => {
        if (e.isIntersecting) {
          el.querySelectorAll('.bar i').forEach((bar) => {
            const target = bar.getAttribute('data-w');
            requestAnimationFrame(() => { bar.style.width = target; });
          });
          io.disconnect();
        }
      });
    }, { threshold: .25 });
    io.observe(el);
    return () => io.disconnect();
  }, []);

  return (
    <section className="section" id="tese" ref={wrap}>
      <div className="container">
        <div className="thesis__head reveal">
          <span className="eyebrow"><span className="dot" /> A tese da Lion Tech</span>
          <h2 style={{ marginTop: 18 }}>
            Presentes comuns são esquecidos. <span className="gradient-text">Presentes personalizados carregam história.</span>
          </h2>
          <p style={{ marginTop: 14, fontSize: 16 }}>
            A diferença não está no preço, está no significado. Uma caneca com a foto, o nome ou a frase certa
            transforma um objeto comum em uma lembrança que dura anos.
          </p>
        </div>

        <div className="thesis__chart reveal">
          <div className="bar-block is-low">
            <h4>Presente comum</h4>
            <span className="value">Impacto baixo</span>
            <div className="bar"><i data-w="32%" /></div>
            <p className="muted" style={{ fontSize: 13.5, marginTop: 10 }}>Bonito, mas substituível. Sem conexão.</p>
          </div>
          <div className="bar-block">
            <h4>Caneca personalizada</h4>
            <span className="value gradient-text">Impacto alto</span>
            <div className="bar"><i data-w="92%" /></div>
            <p style={{ fontSize: 13.5, marginTop: 10, color:'var(--text-soft)' }}>Lembrança feita pra ela. Usada todo dia.</p>
          </div>
        </div>

        <div className="thesis__points reveal">
          <div className="thesis__point">
            <span className="num">1</span>
            <div>
              <strong>Personalização cria conexão emocional.</strong>
              <p>O cérebro guarda o que é único. Uma foto certa vale mais que cem presentes genéricos.</p>
            </div>
          </div>
          <div className="thesis__point">
            <span className="num">2</span>
            <div>
              <strong>A caneca é útil no dia a dia.</strong>
              <p>Diferente de muitos presentes, ela aparece no café da manhã, no trabalho e na rotina.</p>
            </div>
          </div>
          <div className="thesis__point">
            <span className="num">3</span>
            <div>
              <strong>Cada detalhe carrega uma lembrança.</strong>
              <p>Foto, frase, nome, data. Pequenos elementos que reativam memórias toda vez.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// Carrega da variável global pre-populada pelo IndexedDB (ou fallback localStorage)
function loadGalleryItems() {
  if (window.__ltData?.gallery) return window.__ltData.gallery;
  try {
    const saved = localStorage.getItem('lt_gallery_items');
    if (saved) return JSON.parse(saved);
  } catch (_) {}
  return DEFAULT_GALLERY_ITEMS;
}

const galleryWppMessage = 'https://wa.me/5564999116361?text=' +
  encodeURIComponent('Olá! Vi uma caneca no site e quero fazer uma parecida.');

function Gallery() {
  const galleryItems = loadGalleryItems();
  // tilt 3D nas tiles
  const onMouseMove = (e) => {
    const el = e.currentTarget;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - .5;
    const y = (e.clientY - r.top) / r.height - .5;
    el.style.transform = `perspective(900px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg) translateZ(0)`;
  };
  const onLeave = (e) => {
    e.currentTarget.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
  };

  // hover-play em vídeos
  const playOn  = (e) => { const v = e.currentTarget.querySelector('video'); if (v) v.play().catch(()=>{}); };
  const playOff = (e) => { const v = e.currentTarget.querySelector('video'); if (v) { v.pause(); v.currentTime = 0; } };

  return (
    <section className="section" id="galeria">
      <div className="container">
        <div className="gallery__head">
          <div className="reveal">
            <span className="eyebrow"><span className="dot" /> Galeria de produtos</span>
            <h2 style={{ marginTop: 18 }}>
              Algumas das canecas que <span className="gradient-text">já encantaram</span> nossos clientes.
            </h2>
            <p style={{ maxWidth: '60ch', marginTop: 10 }}>
              Passe o mouse para ver os vídeos rodarem e explorar o efeito 3D. Clique em "Quero uma assim" e
              fale direto com a gente no WhatsApp.
            </p>
          </div>
        </div>

        <div className="gallery__grid">
          {galleryItems.map((item, i) => (
            <div
              key={i}
              className="tile reveal tilt"
              onMouseMove={onMouseMove}
              onMouseLeave={(e)=>{ onLeave(e); playOff(e); }}
              onMouseEnter={playOn}
            >
              <div className="tile__media">
                {item.kind === 'photo' && <MugSvg variant={item.variant} />}
                {item.kind === 'video' && item.src && <video src={item.src} muted loop playsInline autoPlay style={{width:'100%',height:'100%',objectFit:'cover'}} />}
                {item.kind === 'image' && item.src && <img src={item.src} alt={item.title} style={{width:'100%',height:'100%',objectFit:'cover'}} />}
                {item.kind === 'video' && !item.src && <MugSvg variant="mae" />}
                {item.kind === 'image' && !item.src && <MugSvg variant="mae" />}
              </div>
              <div className="tile__overlay">
                <span className="tag">{item.tag}</span>
                <h4>{item.title}</h4>
                <a
                  href={galleryWppMessage}
                  target="_blank" rel="noopener"
                  className="tile__cta"
                  aria-label={`Pedir uma caneca parecida com: ${item.title}`}
                >
                  <WppIcon size={14} /> Quero uma assim
                </a>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ============== URGENCY COUNTDOWN ============== */

// Dia das Mães 2026 = 10 de maio de 2026
const MAE_DATE = new Date('2026-05-10T00:00:00');

function pad(n) { return String(n).padStart(2, '0'); }

function Countdown() {
  const [time, setTime] = React.useState({ d: 0, h: 0, m: 0, s: 0 });

  React.useEffect(() => {
    const tick = () => {
      const now = Date.now();
      const diff = Math.max(0, MAE_DATE.getTime() - now);
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      setTime({ d, h, m, s });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="urgency">
      <div className="container urgency__inner">
        <div className="urgency__text">
          <h3>⏳ Tempo restante para o Dia das Mães</h3>
          <p>Pedidos personalizados precisam de prazo. Não deixe para a última hora!</p>
        </div>
        <div className="urgency__clock" aria-live="polite" aria-label="Contador regressivo">
          <div className="clock-unit">
            <span className="num" id="cd-days">{pad(time.d)}</span>
            <span className="lbl">Dias</span>
          </div>
          <span className="clock-sep" aria-hidden="true">:</span>
          <div className="clock-unit">
            <span className="num" id="cd-hours">{pad(time.h)}</span>
            <span className="lbl">Horas</span>
          </div>
          <span className="clock-sep" aria-hidden="true">:</span>
          <div className="clock-unit">
            <span className="num" id="cd-mins">{pad(time.m)}</span>
            <span className="lbl">Minutos</span>
          </div>
          <span className="clock-sep" aria-hidden="true">:</span>
          <div className="clock-unit">
            <span className="num" id="cd-secs">{pad(time.s)}</span>
            <span className="lbl">Segundos</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  // IntersectionObserver para os reveals
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      // Fallback: deixa tudo visível
      els.forEach((el) => el.classList.add('in-view'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('in-view');
          io.unobserve(e.target);
        }
      });
    }, { threshold: .12, rootMargin: '0px 0px -40px 0px' });
    els.forEach((el) => io.observe(el));

    // fallback de segurança após 4s, mostra qualquer reveal restante
    const safety = setTimeout(() => {
      document.querySelectorAll('.reveal:not(.in-view)').forEach((el) => el.classList.add('in-view'));
    }, 4000);

    return () => { io.disconnect(); clearTimeout(safety); };
  }, []);

  return (
    <React.Fragment>
      <HeartBackground />
      <Nav wppLink={WPP_LINK} />
      <main>
        <Countdown />
        <Hero wppLink={WPP_LINK} />

}
